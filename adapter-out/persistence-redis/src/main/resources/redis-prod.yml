# ============================================================
# Redis Layer 운영 환경 설정
# ============================================================
# 활성화: spring.profiles.active=prod
# ============================================================

spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}

logging:
  level:
    org.redisson: INFO
